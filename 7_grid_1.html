<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *
        {
            margin: 0px;
            padding:0px;
        }
        /* type selector */
        .site 
        {
            height: 100vh;
            width: 100vw;
            border: 1px solid black;
            display: grid;
            /* how many rows  */
            grid-template-rows: 1fr 1fr 1fr;
            /* how many columns */
            grid-template-columns: 1fr 1fr 1fr;
        }
        div 
        {
            border: 1px solid black;
            font-size: 72px;
            /* text-align: center;  wont work if display is flex */
            /* set vertical & horizontal alignment */
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body>
    <section class="siter">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
        <div>7</div>
        <div>8</div>
        <div>9</div>
    </section>
</body>

</html>
