<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>input tag in html 5</h1>
    <hr>
    <!-- Name  -->
    <form action="success.html" method="post" >
        <label for="name">Enter your name</label>
        <input type="text" id="name" name="name" required />
        <br>
        <!-- Email  -->
        <label for="email">Enter your email address</label>
        <input type="email" name="email" id="email" required />
        <br>
        <!-- Password -->
        <label for="password">Enter your password</label>
        <input type="password" name="password" id="password" required />
        <br>
        <!-- mobile No -->
        <label for="mobile">Enter your mobile</label>
        <input type="tel" name="mobile" id="mobile" required />
        <br>
        <!-- Birth date -->
        <label for="dob">Enter your birthdate</label>
        <input type="date" name="dob" id="dob" required />
        <br>
        <!-- favorite color -->
        <label for="favcolor">Select your favorite color </label>
        <input type="color" name="favcolor" id="favcolor" />
        <br>
        <!-- website name -->
        <label for="website">Your website address</label>
        <input type="url" name="website" id="website" />
        <br>
        <!--birth time  -->
        <label for="birthtime">Enter your birthtime</label>
        <input type="time" id="birthtime" name="birthtime" />
        <br>
        <!-- pincode -->
        <label for="pincode">Enter your pincode</label>
        <input type="number" id="pincode" name="pincode" required />
        <br>
        <!-- accept photo -->
         <label for="photo">Select photo</label>
         <input type="file" id="photo" name="photo" accept="image/*" >
        <br>
        <!-- button -->
         <input type="submit" value="submit form" name="submit" id="submit" /> 
         <input type="reset" value="clear all" name="clear" id="clear" />
    </form>

</body>

</html>
