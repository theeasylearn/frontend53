<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * 
        {
            padding:0px;
            margin:0px;
        }
        header 
        {
            border:2px solid black;
            position: absolute;
            left: 0px;
            top: 0px;
            width: 100%;
        }
        footer 
        {
            position:absolute;
            bottom: 0px;
            left:0px;
            border: 2px solid black;
            width: 100%;
        }

        div 
        {
            background-color: yellow;
        }
        
    </style>
</head>
<body>
    <header>this is header</header>
    <div>top left</div>
    <div>top right</div>
    <div>bottom left</div>
    <div>bottom right</div>
    <footer>this is footer</footer>
</body>
</html>
