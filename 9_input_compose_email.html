<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- vertical form (one has line message and second line has input) -->
    <h1 align="center">Compose Email</h1>
    <!-- to accept file as input in form, method must be post and   
     enctype="multipart/form-data" must be used -->
    <form action="success.html" method="post" enctype="multipart/form-data">
        <table align="center" width="50%" cellpadding="10" border="1">
            <tr>
                <td>Enter email address*</td>
            </tr>
            <tr>
                <td>
                    <input type="email" name="email" required autocomplete="off" />
                </td>
            </tr>
            <tr>
                <td>
                    Enter subject*
                </td>
            </tr>
            <tr>
                <td>
                    <input type="text" name="subject" required />
                </td>
            </tr>
            <tr>
                <td>
                    Attachment (optional)
                </td>
            </tr>
            <tr>
                <td>
                    <input type="file" name="attachment" />
                </td>
            </tr>
            <tr>
                <td>Enter Message*</td>
            </tr>
            <tr>
                <td>
                    <textarea rows="10" cols="80" name="message" id="message" required></textarea>
                </td>
            </tr>
            <tr>
                <td>
                    <!-- buttons -->
                    <button type="submit" name="submit">Send email</button>
                    <button type="reset" name="reset">Clear all</button>
                    <button type="button" name="button">I cant do anything</button>
                </td>
            </tr>
            <tr>
                <td><b>* = required input</b></td>
            </tr>
        </table>
    </form>
</body>
</html>
