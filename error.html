<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap - Tutorials @ THE EASYLEARN ACADEMY</title>
    <!-- bootstrap framework css CDN link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col-12">
                <div class="card shadow">
                    <div class="card-header text-bg-danger">
                        <h4>registtion</h4>
                    </div>
                    <div class="card-body">
                        <form action="">
                            <div class="row">
                                <div class="col-12 col-sm-12 mb-sm-2 col-md-4">
                                    <label for="surname" class="form-lable">Surname</label>
                                    <input type="text" id="surname" class="form-control" required />
                                </div>
                                <div class="col-12 col-sm-6 col-md-4">
                                    <label for="name" class="form-lable">name</label>
                                    <input type="text" id="name" class="form-control" required />
                                </div>
                                <div class="col-12 col-sm-6  col-md-4">
                                    <label for="fathername" class="form-lable">fathername</label>
                                    <input type="text" id="fathername" class="form-control" required />
                                </div>
                            </div>
                        </form>
                    </div>

                </div>
            </div>
        </div>
    </div>
    <!-- bootstrap framework javascript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="https://kit.fontawesome.com/20994dd270.js" crossorigin="anonymous"></script>
</body>

</html>
