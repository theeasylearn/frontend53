<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap - Tutorials @ THE EASYLEARN ACADEMY</title>
    <!-- bootstrap framework css CDN link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col-lg-6 offset-3">
                <div class="card shadow">
                    <div class="card-header text-bg-danger">
                        <h3>Change password</h3>
                    </div>
                    <div class="card-body">
                        <form action="success.html" method="post">
                            <div class="row mb-3">
                                <div class="col-4">
                                    <label for="col-form-label">Current password</label>
                                </div>
                                <div class="col-8">
                                    <input type="password" id="password" name="password" required placeholder="current password" class="form-control" />
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-4">
                                    <label for="new_password" class="col-form-label">New password</label>
                                </div>
                                <div class="col-8">
                                    <input type="password" id="new_password" class="form-control" placeholder="new Password" required />
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-4">
                                    <label for="confirm_new_password" class="col-form-label">retype New password</label>
                                </div>
                                <div class="col-8">
                                    <input type="password" id="confirm_new_password" class="form-control" placeholder="confirm new Password" required />
                                </div>
                            </div>
                            <div class="mb-3 d-flex justify-content-end">
                                <input type="submit" class="btn btn-danger" value="save changes" />&nbsp;
                                <input type="reset" class="btn btn-dark" value="clear all">
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- bootstrap framework javascript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="https://kit.fontawesome.com/20994dd270.js" crossorigin="anonymous"></script>
</body>

</html>
