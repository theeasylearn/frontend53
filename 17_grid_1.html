<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap - Tutorials @ THE EASYLEARN ACADEMY</title>
    <!-- bootstrap framework css CDN link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        img {
            height: 175px !important;
            width: 100% !important;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- one virtual horizontal line (it has made of 12 unit) -->
        <div class="row">
            <div class="col-12 border">
                12 column 
            </div>
        </div>
        <div class="row">
            <div class="col-6 border">1st 6 column div</div>
            <div class="col-6 border">1st 6 column div</div>

            <div class="col-2 border">3rd 2 column div</div>
            <div class="col-10 border">4th 10 column div</div>
        </div>
        <div class="row">
            <div class="col-4 border">1</div>
            <div class="col-4 border">2</div>
            <div class="col-4 border">3</div>
        </div>
        <div class="row">
            <div class="col-3 border">1</div>
            <div class="col-3 border">2</div>
            <div class="col-3 border">3</div>
            <div class="col-3 border">4</div>
        </div>
        <div class="row">
            <div class="col-2 border">1</div>
            <div class="col-2 border">2</div>
            <div class="col-2 border">3</div>
            <div class="col-3 border">4</div>
            <div class="col-3 border">5</div>
        </div>
        <div class="row">
            <div class="col-2 border">1</div>
            <div class="col-2 border">2</div>
            <div class="col-2 border">3</div>
            <div class="col-2 border">4</div>
            <div class="col-2 border">5</div>
            <div class="col-2 border">6</div>
        </div>
        <div class="row">
            <div class="col-5 border">1</div>
            <div class="col-7 border">2</div>
        </div>
        <div class="row">
            <div class="col-4 border">1</div>
            <div class="col-8 border">2</div>
        </div>
        <div class="row">
            <div class="col-3 border">1</div>
            <div class="col-9 border">2</div>
        </div>
        <div class="row">
            <div class="col-1 border">1</div>
            <div class="col-11 border">2</div>
        </div>
    </div>
    <!-- bootstrap framework javascript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="https://kit.fontawesome.com/20994dd270.js" crossorigin="anonymous"></script>
</body>

</html>
