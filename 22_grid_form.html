<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap - Tutorials @ THE EASYLEARN ACADEMY</title>
    <!-- bootstrap framework css CDN link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col-12">
                <div class="card shadow">
                    <div class="card-header text-bg-danger">
                        <H4>Register</H4>
                    </div>
                    <div class="card-body">
                        <form action="">
                            <div class="row">
                                <div class="col-12">
                                    <label for="surname" class="form-label">Surname</label>
                                    <input type="text" id="surname" class="form-control" required />
                                </div>
                                <div class="col-12">
                                    <label for="name" class="form-label">Name</label>
                                    <input type="text" id="name" class="form-control" required />
                                </div>
                                <div class="col-12">
                                    <label for="fathername" class="form-label">Fathername</label>
                                    <input type="text" id="fathername" class="form-control" required />
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-12">
                                    <label for="email" class="form-label">Email</label>
                                    <input type="email" id="email" class="form-control" required />
                                </div>
                                <div class="col-12">
                                    <label for="mobile" class="form-label">Mobile</label>
                                    <input type="tel" id="mobile" class="form-control" required />
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-12">
                                    <label for="dob" class="form-label">Bithdate</label>
                                    <input type="date" id="dob" class="form-control" required />
                                </div>
                                <div class="col-12">
                                    <span class="fw-bold">Select Gender</span>
                                    <div class="form-check">
                                        <label for="" class="form-check-label">
                                            <input type="radio" name="gender" id="male" value="1"
                                                class="form-check-input" required />
                                                Male
                                        </label>
                                    </div>
                                    <div class="form-check">
                                        <label for="" class="form-check-label">
                                            <input type="radio" name="gender" id="female" value="0"
                                                class="form-check-input" required />
                                                Female
                                        </label>
                                    </div>

                                </div>
                                <div class="col-12">
                                     <span class="fw-bold">Martial status</span>
                                    <div class="form-check-inline">
                                        <label for="" class="form-check-label">
                                            <input type="radio" name="status" id="married" value="1" required> Married
                                        </label>
                                    </div>
                                    <div class="form-check-inline">
                                        <label for="" class="form-check-label">
                                            <input type="radio" name="status" id="unmarried" value="0" required>
                                            Unmarried
                                        </label>
                                    </div>
                                </div>
                                <div class="col-12">
                                    <label for="caste" class="form-label">select caste</label>
                                    <select name="caste" id="caste" class="form-select">
                                        <option value="">select</option>
                                        <option value="1">General</option>
                                        <option value="2">OBC</option>
                                        <option value="3">SC</option>
                                        <option value="4">ST</option>
                                    </select>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-12">
                                    <label for="photo" class="form-label">Select photo</label>
                                    <input type="file" id="photo" class="form-control" required />
                                </div>
                                <div class="col-12">
                                    <label for="" class="form-label">City</label>
                                    <input type="text" id="" class="form-control" required />
                                </div>
                                <div class="col-12">
                                    <label for="" class="form-label">Pincode</label>
                                    <input type="text" id="" class="form-control" required />
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-12 d-flex justify-content-end">
                                    <input type="submit" class="btn btn-danger" value="register" /> &nbsp;
                                    <input type="reset" class="btn btn-dark" value="clear all">
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- bootstrap framework javascript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="https://kit.fontawesome.com/20994dd270.js" crossorigin="anonymous"></script>
</body>

</html>
