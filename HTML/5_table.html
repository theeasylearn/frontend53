<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table tag - </title>
</head>
<body>
    <h1>table tag</h1>
    <table border="1" cellpadding="10" align="center" width="50%">
        <thead>
            <tr>
                <th colspan="5"><h2>Result of  students 's test @ the easylearn academy</h2></th>
            </tr>
            <tr> <!-- table row -->
                <th  bgcolor="yellow" width="40%">Name</th> 
                <th bgcolor="yellow">HTML</th> 
                <th bgcolor="yellow">CSS</th> 
                <th bgcolor="yellow">Javascript</th> 
                <th bgcolor="yellow" width="20%">Total</th> 
                <!-- th column heading -->
            </tr>
        </thead>
        <tbody>
            <tr>
                <!-- table data -->
                <td>Pooja</td>
                <td>50</td>
                <td>60</td>
                <td>70</td>
                <td>180</td>
            </tr>
            <tr>
                <td>Priyanka</td>
                <td>60</td>
                <td>70</td>
                <td>80</td>
                <td>210</td>
            </tr>
            <tr>
                <td>Anuradha</td>
                <td>70</td>
                <td>80</td>
                <td>90</td>
                <td>240</td>
            </tr>
            <tr>
                <td>rinkal</td>
                <td>80</td>
                <td>90</td>
                <td>100</td>
                <td>270</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="4"><b>Grand total</b></td>
                <td>1100</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
