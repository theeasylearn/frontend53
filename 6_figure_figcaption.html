    <table>

            </td>
            <td width="33.33%" align="center">
                <figure>
                    <img width="400px" src="images/sachin.png" alt="image not available" />

            </td>
            <td width="33.33%" align="center">

                    </figcaption>
                </figure>

        </tr>
    </table>
</body>
</html>
