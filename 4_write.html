<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>document.write method</h1>
    <hr />
    <script>
        //for multiline use ` (backquote)
        var content = `ૐ ભુર્ભુવસ્વઃ તત્સ વિતુર વરેનિયમ <br/>
ભર્ગોદેવસ્ય ઘી મહી <br/>
ધિયો યો નઃ પ્રચોદયાત ॥ <br/>`

        var content2 = "|| ઓં નમઃ શિવાય ||"
        document.write(content,content2)
    </script>
</body>
</html>
