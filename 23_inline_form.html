<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap - Tutorials @ THE EASYLEARN ACADEMY</title>
    <!-- bootstrap framework css CDN link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container-fluid bg-light shadow p-3 d-flex justify-content-center">
        <form action="" class="row row-cols-lg-auto g-3">
            <div class="col-12">
                <label for="source" class="form-label">Source</label>
                <input type="text" id="source" class="form-control" required />
            </div>
            <div class="col-12">
                <label for="destination" class="form-label">Destination</label>
                <input type="text" id="destination" class="form-control" required />
            </div>
            <div class="col-12">
                <label for="journey_date" class="form-label">Journey date</label>
                <input type="date" id="journey_date" class="form-control" required />
            </div>
            <div class="col-12">
                <label for="seats" class="form-label">Select no of seats</label>
                <select name="seats" id="seats" class="form-select">
                    <option value="">select</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                </select>
            </div>
            <div class="col-12">
                <br>
                <div class="form-check">
                    <label for="" class="form-check-label">
                        <input type="checkbox" class="form-check-input" />
                        Single lady
                    </label>
                </div>
            </div>
            <div class="col-12">
                <br>
                <button type="submit" class="btn btn-danger">Search 
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>
        </form>
    </div>
    <!-- bootstrap framework javascript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="https://kit.fontawesome.com/20994dd270.js" crossorigin="anonymous"></script>
</body>

</html>
